<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>CaféCat SPA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#/home">CaféCat</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="#/home">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="#/catalogo">Catálogo</a></li>
          <li class="nav-item"><a class="nav-link" href="#/carrito">Carrito</a></li>
          <li class="nav-item"><a class="nav-link" href="#/login">Login</a></li>
          <li class="nav-item"><a class="nav-link" href="#/admin">Admin</a></li>
        </ul>
        <form id="searchForm" class="d-flex" role="search">
          <input id="q" class="form-control me-2" type="search" placeholder="Buscar..." aria-label="Buscar" />
          <button class="btn btn-outline-light" type="submit">Buscar</button>
        </form>
      </div>
    </div>
  </nav>
  <section id="status" class="alert alert-secondary mb-0 rounded-0 small" role="status" aria-live="polite"></section>
  <main id="app" class="container my-4" tabindex="-1"></main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
